services:
  # 1. The Apache Web Server (with PHP built-in)
  web:
    build: .
    container_name: apache_server
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # 2. The MySQL Database
  db:
    image: mysql:8.0
    container_name: supplement_store
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supplement_store
    volumes:
      - db_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d

  # 3. phpMyAdmin (Web interface to manage MySQL)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_ui
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db

volumes:
  db_data:
